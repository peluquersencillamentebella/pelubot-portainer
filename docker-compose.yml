version: "3.9"

services:
  peluqueria-bot:
    build: .
    container_name: peluqueria-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - bot-data:/app/data
      - bot-auth:/app/auth_info
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - AUTH_DIR=/app/auth_info
      # Google (pega el contenido minificado de tus archivos JSON)
      - GOOGLE_CREDENTIALS=PEGA_AQUI_EL_CONTENIDO_DE_credentials.json
      - GOOGLE_TOKEN=PEGA_AQUI_EL_CONTENIDO_DE_token.json

volumes:
  bot-data:
  bot-auth:
